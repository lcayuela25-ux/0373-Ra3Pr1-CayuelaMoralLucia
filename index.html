<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de notes</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="contenidor">
    <h1>Calculadora de notes d'alumnes</h1>

    <form id="formulariAlumne">
      <div class="camp">
        <label for="nom">Nom de l'alumne</label>
        <input type="text" id="nom" name="nom">
      </div>

      <div class="camp">
        <label for="examen">Nota examen</label>
        <input type="number" id="examen" name="examen" step="0.01">
      </div>

      <div class="camp">
        <label for="practiques">Nota pràctiques</label>
        <input type="number" id="practiques" name="practiques" step="0.01">
      </div>

      <div class="camp">
        <label for="actitud">Nota actitud</label>
        <input type="number" id="actitud" name="actitud" step="0.01">
      </div>

      <div class="botons">
        <button type="submit">Afegir alumne</button>
        <button type="button" id="ordenarAsc">Ordenar per nota ↑</button>
        <button type="button" id="ordenarDesc">Ordenar per nota ↓</button>
      </div>
    </form>

    <div id="missatge"></div>

    <h2>Llista d'alumnes</h2>
    <table>
      <thead>
        <tr>
          <th>Nom</th>
          <th>Examen</th>
          <th>Pràctiques</th>
          <th>Actitud</th>
          <th>Nota final</th>
          <th>Estat</th>
        </tr>
      </thead>
      <tbody id="cosTaula">
      </tbody>
    </table>
  </div>

  <script src="script.js"></script>
</body>
</html>
